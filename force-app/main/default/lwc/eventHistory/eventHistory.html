<template>
    <div class="event-history">
        <!-- Header Section -->
        <div class="event-history__header">
            <h2 class="event-history__title">Event History</h2>
            <div class="event-history__header-content">
                <p class="event-history__description">
                    View and manage your events. You can add new events or edit
                    existing ones.
                </p>
                <button
                    class="event-history__button event-history__button--add"
                    onclick={handleAddEvent}
                >
                    <lightning-icon
                        icon-name="utility:add"
                        size="xx-small"
                        alternative-text="Add"
                    ></lightning-icon>
                    Add Event
                </button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <template lwc:if={isLoading}>
            <div
                class="slds-is-relative event-history__spinner-container"
                role="status"
            >
                <lightning-spinner
                    alternative-text="Loading events"
                    size="medium"
                ></lightning-spinner>
            </div>
        </template>

        <!-- Event List -->
        <template lwc:elseif={hasEvents}>
            <ul
                class="event-history__list"
                role="list"
                aria-label="Event records"
            >
                <template for:each={eventList} for:item="evt">
                    <li
                        key={evt.Id}
                        class="event-history__card"
                        role="listitem"
                    >
                        <p class="event-history__card-title">
                            {evt.displayName}
                        </p>
                        <p class="event-history__card-detail">
                            {evt.displayDate}
                        </p>
                        <p class="event-history__card-detail">
                            {evt.displayStatus}
                        </p>
                        <div
                            class="event-history__card-actions"
                            role="group"
                            aria-label={evt.actionsLabel}
                        >
                            <button
                                class="event-history__button"
                                data-id={evt.Id}
                                onclick={handleEdit}
                                aria-label={evt.editLabel}
                            >
                                Edit
                            </button>
                            <button
                                class="event-history__button event-history__button--delete"
                                data-id={evt.Id}
                                onclick={handleDeleteClick}
                                aria-label={evt.deleteLabel}
                            >
                                Delete
                            </button>
                        </div>
                    </li>
                </template>
            </ul>
        </template>

        <!-- Empty State -->
        <template lwc:else>
            <p class="event-history__empty" role="status">
                No events found. Click &ldquo;Add Event&rdquo; to create one.
            </p>
        </template>

        <!-- Create/Edit Modal -->
        <template lwc:if={isFormModalOpen}>
            <section
                role="dialog"
                tabindex="-1"
                aria-modal="true"
                aria-labelledby="form-modal-heading"
                class="slds-modal slds-fade-in-open"
                onkeydown={handleModalKeyDown}
            >
                <div class="slds-modal__container">
                    <button
                        class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={closeFormModal}
                    >
                        <lightning-icon
                            icon-name="utility:close"
                            alternative-text="Close"
                            size="small"
                            variant="inverse"
                        ></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <header class="slds-modal__header">
                        <h2
                            id="form-modal-heading"
                            class="slds-modal__title slds-hyphenate"
                        >
                            {modalTitle}
                        </h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-record-edit-form
                            object-api-name="Event__c"
                            record-id={selectedRecordId}
                            onsubmit={handleFormSubmit}
                            onsuccess={handleFormSuccess}
                            onerror={handleFormError}
                            density="comfy"
                        >
                            <lightning-messages></lightning-messages>
                            <div class="slds-grid slds-wrap slds-gutters_small">
                                <div
                                    class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"
                                >
                                    <lightning-input-field
                                        field-name="Name"
                                        required
                                    ></lightning-input-field>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"
                                >
                                    <lightning-input-field
                                        field-name="Type__c"
                                    ></lightning-input-field>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"
                                >
                                    <lightning-input-field
                                        field-name="Status__c"
                                    ></lightning-input-field>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"
                                >
                                    <lightning-input-field
                                        field-name="Event_Date__c"
                                    ></lightning-input-field>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-1 slds-p-bottom_x-small"
                                >
                                    <lightning-input-field
                                        field-name="Description__c"
                                    ></lightning-input-field>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"
                                >
                                    <lightning-input-field
                                        field-name="Venue__c"
                                    ></lightning-input-field>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"
                                >
                                    <lightning-input-field
                                        field-name="Capacity__c"
                                    ></lightning-input-field>
                                </div>
                            </div>
                        </lightning-record-edit-form>
                    </div>
                    <footer class="slds-modal__footer">
                        <button
                            class="slds-button slds-button_neutral"
                            onclick={closeFormModal}
                        >
                            Cancel
                        </button>
                        <button
                            class="slds-button slds-button_brand"
                            onclick={handleSaveClick}
                        >
                            Save
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Delete Confirmation Modal -->
        <template lwc:if={isDeleteModalOpen}>
            <section
                role="alertdialog"
                tabindex="-1"
                aria-modal="true"
                aria-labelledby="delete-modal-heading"
                aria-describedby="delete-modal-content"
                class="slds-modal slds-fade-in-open"
                onkeydown={handleModalKeyDown}
            >
                <div class="slds-modal__container">
                    <button
                        class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={closeDeleteModal}
                    >
                        <lightning-icon
                            icon-name="utility:close"
                            alternative-text="Close"
                            size="small"
                            variant="inverse"
                        ></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <header class="slds-modal__header">
                        <h2
                            id="delete-modal-heading"
                            class="slds-modal__title"
                        >
                            Delete Event
                        </h2>
                    </header>
                    <div
                        class="slds-modal__content slds-p-around_medium"
                        id="delete-modal-content"
                    >
                        <p>
                            Are you sure you want to delete this event? This
                            action cannot be undone.
                        </p>
                    </div>
                    <footer class="slds-modal__footer">
                        <button
                            class="slds-button slds-button_neutral"
                            onclick={closeDeleteModal}
                        >
                            Cancel
                        </button>
                        <button
                            class="slds-button slds-button_destructive"
                            onclick={handleDeleteConfirm}
                        >
                            Delete
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
